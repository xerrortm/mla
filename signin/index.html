<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoggleTools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../favicon.png?v=5">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-panel { border: 1px solid rgba(229, 231, 235, 0.5); }
    .glass { border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center text-white">
  <div class="bg-white glass w-[90%] max-w-md rounded-2xl p-8 text-center shadow-2xl">
    <div class="mb-6">
      <i class="fas fa-quote-right text-blue-600 text-5xl"></i>
    </div>
    <h1 class="text-slate-900 text-2xl font-bold mb-2">GoggleTools</h1>
    <p class="text-sm text-slate-700 mb-6">Sign In Verification</p>
    <div class="bg-slate-400 rounded-xl p-3 mb-6 border border-slate-500">
      <p class="text-xs text-slate-700">Are you sure you want to sign in with</p>
      <p id="user" class="font-bold text-slate-800 break-all">loading...</p>
    </div>
    <button
      onclick="confirmLogin()"
      class="w-full bg-blue-600 hover:bg-blue-700 transition px-4 py-3 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2"
    >
      <i class="fas fa-check"></i>
      Confirm Sign In
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const param = params.get("user") || "unknown";
    const user = localStorage.getItem("profileUsername") || "unknown"

    document.getElementById("user").innerText = param;

    function confirmLogin() {
      window.location.href =
        "https://xerrortm.github.io/" + param + "/?user=" + encodeURIComponent(user) + "&verified=true";
    }
  </script>
</body>
</html>
