<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoggleTools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../favicon.png?v=5">
  <style>
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #0f172a, #020617); }
    .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(229, 231, 235, 0.5); }
    .glass { border: 1px solid rgba(255,255,255,0.1); }
    @keyframes floaty {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .float {
      animation: floaty 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
    <nav class="sticky top-0 z-50 glass-panel border-b border-slate-200 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-quote-right text-white text-lg"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">GoggleTools</h1>
        </div>  
    </nav>
  <div class="glass w-[90%] max-w-md rounded-2xl p-8 text-center shadow-2xl">
    <p class="text-sm text-slate-300 mb-6">Sign in</p>

    <div class="bg-white/10 rounded-xl p-3 mb-6 border border-white/10">
      <p class="text-xs text-slate-300">Detected user</p>
      <p id="user" class="font-bold text-blue-300 break-all">loading...</p>
    </div>

    <button onclick="confirmLogin()" class="w-full bg-blue-600 hover:bg-blue-700 transition px-4 py-3 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2">
      <i class="fas fa-check"></i>
      Confirm Sign In
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const param = params.get("user") || "unknown";
    const user = localStorage.getItem("profileUsername") || "unknown"

    document.getElementById("user").innerText = param;

    function confirmLogin() {
      window.location.href =
        "https://xerrortm.github.io/dad/?user=" +
        encodeURIComponent(user) +
        "&verified=true";
    }
  </script>

</body>
</html>
