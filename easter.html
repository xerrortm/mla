<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>Easter Island | GoggleTools</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&family=JetBrains+Mono&display=swap');
        
        body {
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Inter', sans-serif;
        }

        #ui-overlay {3
            position: absolute;
            top: 20px;

            pointer-events: none;

            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            pointer-events: none;
        }
        body {
    margin: 0;
    overflow-x: hidden;
}

#canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

.spacer {
    height: 75vh;
}

.card {
    z-index: 10;
    width: 80%;
    max-width: 800px;
    margin: 80px auto;
    padding: 50px !important;

    background: rgba(255, 255, 255, 0.15);  /* lighter frosted glass */
    backdrop-filter: blur(15px) saturate(150%);  /* extra blur and saturation */
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    color: #ffffff;
    text-align: left;
    font-weight: 500;
    letter-spacing: 0.5px;

    opacity: 1;
    transform: translateY(70vh);
    transition: all 1s ease-in-out;
}
.home {
z-index:10;
    width: 80%;
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;

    background: rgba(255, 255, 255, 0.15);  /* lighter frosted glass */
    backdrop-filter: blur(15px) saturate(150%);  /* extra blur and saturation */
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    color: #ffffff;
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

    </style>
</head>
<body>
<!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-panel px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-quote-right text-white text-lg"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">GoggleTools</h1>
        </div>  
        <div class="flex items-center gap-4">
         
            <button onclick="location.href='https://www.xerrortm.github.io/mla/'" class="text-sm font-semibold text-slate-600 hover:text-blue-600 px-3 py-2">
                <i class="fas fa-undo"></i>
                Back
            </button>
        </div>
    </nav>

<section class="home group bg-white bg-opacity-50 p-6 rounded-2xl shadow-sm border border-slate-200">
    <h2 class="font-bold text-lg text-slate-900 mb-1">Welcome to the Easter Island</h2>
    <p class="text-slate-800 text-sm"">This is a magical floating island experience.</p>
<br>
    <button id="start" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-semibold hover:bg-blue-700 transition">
        Explore
    </button>
</section>


    <!-- 3D Canvas (fixed background) -->
    <div id="canvas-container"></div>

    <!-- Scrollable Content -->
    <div id="scroll-content">

        <!-- Spacer so nothing shows at first -->
        <section class="spacer"></section>

<!-- Cards -->
<section id="more" class="card group bg-white bg-opacity-80 p-6 rounded-2xl shadow-sm border border-slate-200">
    <h1 class="font-bold text-4xl text-slate-900 mb-1">EASTER EVENT</h1>
<br>
    <h2 class="font-bold text-lg text-slate-900 mb-1">Available Features</h2>
<br>
    <li class="text-slate-800 text-sm"">Export as TXT file format</li>
<li class="text-slate-800 text-sm"">Export as PDF format</li>
<li class="text-slate-800 text-sm"">Export as microsoft word</li>
<br>
    <button onclick="location.href='https://www.xerrortm.github.io/mla'"class="bg-blue-600 text-white px-5 py-2 rounded-xl font-semibold hover:bg-blue-700 transition">
        Try Now
    </button>
</section>

        <!-- Bottom spacer -->
        <section class="spacer"></section>

    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, islandGroup, clouds = [];
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotationX = 0.1;
        let targetRotationY = 0;

        const ISLAND_RADIUS = 10; 

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0xa1c4fd, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18; 
            camera.position.y = 0;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(10, 20, 15);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -15;
            sunLight.shadow.camera.right = 15;
            sunLight.shadow.camera.top = 15;
            sunLight.shadow.camera.bottom = -15;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            const backLight = new THREE.PointLight(0x00aaff, 0.5);
            backLight.position.set(-10, -5, -10);
            scene.add(backLight);

            islandGroup = new THREE.Group();
            createIsland();
            scene.add(islandGroup);

            // Create background clouds
            createClouds();

            window.addEventListener('resize', onWindowResize, false);
            setupInteractions();

            animate();
        }

        function createIsland() {
            // Main Base
            const baseGeometry = new THREE.ConeGeometry(ISLAND_RADIUS, 8, 12);
            const baseMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4d3319,
                roughness: 0.9,
                flatShading: true
            });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            base.rotation.x = Math.PI;
            base.position.y = -4;
            base.castShadow = true;
            base.receiveShadow = true;
            islandGroup.add(base);

            // Grass Top
            const grassGeometry = new THREE.CylinderGeometry(ISLAND_RADIUS, ISLAND_RADIUS + 0.5, 0.8, 40);
            const grassMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x7cfc00,
                roughness: 0.8
            });
            const grass = new THREE.Mesh(grassGeometry, grassMaterial);
            grass.position.y = 0;
            grass.receiveShadow = true;
            islandGroup.add(grass);

            // Add Rocky Hill (Waterfall removed)
            createRockyHill();

            // Add Rocks
            for(let i = 0; i < 15; i++) {
                addRock();
            }

            // Add Trees
            for(let i = 0; i < 12; i++) {
                addTree();
            }

            // Add Easter Eggs
            const eggColors = [0xff69b4, 0x00ffff, 0xffd700, 0x9370db, 0xff4500, 0xffffff, 0x98fb98];
            for(let i = 0; i < 25; i++) {
                const color = eggColors[i % eggColors.length];
                addEgg(color);
            }
        }

        function createRockyHill() {
            const hillGroup = new THREE.Group();
            hillGroup.position.set(-4, 0, -4); 

            // Cluster of large rocks
            for(let i = 0; i < 6; i++) {
                const size = 1.5 + Math.random() * 2;
                const rockGeo = new THREE.DodecahedronGeometry(size, 0);
                const rockMat = new THREE.MeshStandardMaterial({ color: 0x666666, flatShading: true });
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(
                    (Math.random() - 0.5) * 2,
                    i * 0.5,
                    (Math.random() - 0.5) * 2
                );
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true;
                rock.receiveShadow = true;
                hillGroup.add(rock);
            }
            islandGroup.add(hillGroup);
        }

        function createClouds() {
            const cloudMaterial = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            for (let i = 0; i < 30; i++) {
                const cloudGroup = new THREE.Group();
                const puffCount = 3 + Math.floor(Math.random() * 4);
                
                for (let j = 0; j < puffCount; j++) {
                    const puffGeo = new THREE.SphereGeometry(1.5 + Math.random(), 12, 12);
                    const puff = new THREE.Mesh(puffGeo, cloudMaterial);
                    puff.position.set(j * 1.5, (Math.random() - 0.5) * 1, (Math.random() - 0.5) * 1);
                    cloudGroup.add(puff);
                }

                // Random placement in the distant sky
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 200,
                    10 + Math.random() * 35,
                    -30 - Math.random() * 30
                );
                
                const scale = 0.5 + Math.random() * 1.5;
                cloudGroup.scale.set(scale, scale, scale);
                
                // Store speed for animation
                cloudGroup.userData.speed = 0.005 + Math.random() * 0.02;
                
                scene.add(cloudGroup);
                clouds.push(cloudGroup);
            }
        }

        function addTree() {
            const treeGroup = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.5;
            treeGroup.add(trunk);

            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32, flatShading: true });
            for(let i = 0; i < 3; i++) {
                const fGeo = new THREE.ConeGeometry(0.8 - (i * 0.2), 1.2, 8);
                const foliage = new THREE.Mesh(fGeo, foliageMat);
                foliage.position.y = 1.2 + (i * 0.6);
                foliage.castShadow = true;
                treeGroup.add(foliage);
            }

            const angle = Math.random() * Math.PI * 2;
            const radius = 2 + Math.random() * (ISLAND_RADIUS - 2);
            const posX = Math.cos(angle) * radius;
            const posZ = Math.sin(angle) * radius;
            
            if (posX < -2 && posZ < -2) return addTree(); 

            treeGroup.position.set(posX, 0.4, posZ);
            treeGroup.scale.setScalar(0.8 + Math.random() * 0.7);
            islandGroup.add(treeGroup);
        }

        function addRock() {
            const size = 0.4 + Math.random() * 1.2;
            const geo = new THREE.DodecahedronGeometry(size, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.7, flatShading: true });
            const rock = new THREE.Mesh(geo, mat);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * (ISLAND_RADIUS - 0.5);
            rock.position.set(Math.cos(angle) * radius, size * 0.3, Math.sin(angle) * radius);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            rock.castShadow = true;
            rock.receiveShadow = true;
            islandGroup.add(rock);
        }

        function addEgg(color) {
            const points = [];
            for (let i = 0; i <= 20; i++) {
                const t = i / 20;
                const x = Math.sin(t * Math.PI) * (1 - 0.2 * Math.cos(t * Math.PI));
                const y = -Math.cos(t * Math.PI);
                points.push(new THREE.Vector2(x * 0.25, y * 0.35));
            }
            const geo = new THREE.LatheGeometry(points, 24);
            const mat = new THREE.MeshPhysicalMaterial({ 
                color: color,
                metalness: 0.1,
                roughness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                emissive: color,
                emissiveIntensity: 0.05
            });
            
            const egg = new THREE.Mesh(geo, mat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 1 + Math.random() * (ISLAND_RADIUS - 1.5);
            
            egg.position.set(Math.cos(angle) * radius, 0.3, Math.sin(angle) * radius);
            egg.rotation.z = (Math.random() - 0.5) * 1.5; 
            egg.rotation.x = (Math.random() - 0.5) * 1.5;
            egg.castShadow = true;
            egg.receiveShadow = true;
            
            islandGroup.add(egg);
        }

        function setupInteractions() {
    const container = document.body;

    const handleStart = (x, y) => { 
        isDragging = true; 
        previousMousePosition = { x, y }; 
    };
    const handleMove = (x, y) => {
        if (isDragging) {
            const deltaX = x - previousMousePosition.x;
            const deltaY = y - previousMousePosition.y;
            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;
            targetRotationX = Math.max(-0.2, Math.min(1.2, targetRotationX));
            previousMousePosition = { x, y };
        }
    };
    const handleEnd = () => { isDragging = false; };

    // Mouse events
    container.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleEnd);

    // Touch drag
    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
    });
    window.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        // Two-finger vertical scroll to zoom out
        if (e.touches.length === 2) {
            const deltaY = (e.touches[0].clientY - e.touches[1].clientY) * 0.5;
            camera.position.z = Math.max(18, Math.min(30, camera.position.z + deltaY * 0.02));
        }
    });
    window.addEventListener('touchend', handleEnd);

    // Mouse wheel zoom
    window.addEventListener('wheel', (e) => {
        camera.position.z = Math.max(18, Math.min(30, camera.position.z + e.deltaY * 0.02));
    });
}

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Animate island floating
            islandGroup.position.y = Math.sin(time * 0.4) * 0.5; //0.3
            islandGroup.rotation.y += (targetRotationY - islandGroup.rotation.y) * 0.05;
            islandGroup.rotation.x += (targetRotationX - islandGroup.rotation.x) * 0.05;

            // Animate clouds moving across the sky
            clouds.forEach(cloud => {
                cloud.position.x += cloud.userData.speed;
                // Loop back around
                if (cloud.position.x > 100) {
                    cloud.position.x = -100;
                }
            });

            renderer.render(scene, camera);
        }
document.getElementById('start').addEventListener('click', () => {
    const target = document.getElementById('more'); // section to scroll to

    window.scrollTo({
        top: target.offsetTop,
        behavior: 'smooth'
    });
});

window.onload = init;
    </script>
</body>
